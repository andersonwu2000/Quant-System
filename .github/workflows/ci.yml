name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[dev]"
      - run: ruff check src/ tests/
      - run: mypy src/

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[dev]"
      - run: pytest tests/ -v

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps && bun install
      - run: cd apps/web && bun run typecheck

  web-test:
    runs-on: ubuntu-latest
    needs: web-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps && bun install
      - run: cd apps/web && bun run test

  web-build:
    runs-on: ubuntu-latest
    needs: web-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps && bun install
      - run: cd apps/web && bun run build

  shared-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps && bun install
      - run: cd apps/shared && bun run test

  android-build:
    runs-on: ubuntu-latest
    outputs:
      apk-path: apps/android/app/build/outputs/apk/debug/app-debug.apk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: |
          chmod +x apps/android/gradlew
          cd apps/android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quant-trading-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  e2e-test:
    runs-on: ubuntu-latest
    needs: web-build
    defaults:
      run:
        working-directory: apps
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd web && npx playwright install --with-deps chromium
      - run: cd web && bun run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Release ────────────────────────────────────────────────────────────────
  # 只在 push 到 master 且所有 CI 通過後才執行
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - backend-lint
      - backend-test
      - web-typecheck
      - web-test
      - web-build
      - shared-test
      - android-build
      - e2e-test
    permissions:
      contents: write   # 允許建立 Release 和 tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 history 來產生 changelog

      # 讀取版本號（從 pyproject.toml）
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          DATE=$(date +'%Y.%m.%d')
          BUILD_NUM=${{ github.run_number }}
          TAG="v${VERSION}-build.${BUILD_NUM}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag will be: ${TAG}"

      # 下載 APK（從 android-build job 產出的 artifact）
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: quant-trading-debug
          path: dist/

      # 重新命名 APK，含版本資訊
      - name: Rename APK
        run: |
          TAG=${{ steps.version.outputs.tag }}
          mv dist/app-debug.apk "dist/quant-trading-${TAG}.apk"
          ls -lh dist/

      # 產生 Changelog（從上一個 tag 到現在的 commit 記錄）
      - name: Generate changelog
        id: changelog
        run: |
          # 取得上一個 release tag
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1 || echo "")
          if [[ -z "$PREV_TAG" ]]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi

          # 寫入多行 output（使用 heredoc 方式）
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 建立 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.date }} (build #${{ github.run_number }})"
          body: |
            ## 📦 Quant Trading System ${{ steps.version.outputs.version }}

            **發佈時間：** ${{ steps.version.outputs.date }}
            **Build：** #${{ github.run_number }}
            **Commit：** ${{ github.sha }}

            ---

            ### 📱 Android APK
            下載下方 `quant-trading-*.apk` 並安裝（需開啟「允許未知來源」）

            > ⚠️ 此為 Debug 版本，僅供測試使用

            ---

            ### 📝 本次更新
            ${{ steps.changelog.outputs.commits }}

            ---

            ### ✅ CI 檢查
            | 項目 | 狀態 |
            |------|------|
            | Backend Lint | ✅ |
            | Backend Tests (1323) | ✅ |
            | Web Typecheck | ✅ |
            | Web Tests | ✅ |
            | Web Build | ✅ |
            | Shared Tests | ✅ |
            | Android Build | ✅ |
            | E2E Tests | ✅ |
          files: |
            dist/quant-trading-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
