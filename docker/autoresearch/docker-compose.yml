services:
  # Agent: Claude Code CLI — only has work/ and data/ (no evaluate.py, no src/)
  agent:
    build:
      context: ../..
      dockerfile: docker/autoresearch/Dockerfile.agent
    container_name: autoresearch-agent
    restart: unless-stopped
    networks:
      - autoresearch-net
    mem_limit: 8g
    cpus: 4
    tmpfs:
      - /tmp:size=512m
    volumes:
      - ./work:/app/work                            # factor.py + results.tsv (rw)
      - ../../data/yahoo:/app/data/yahoo:ro            # Yahoo price data
      - ../../data/finmind:/app/data/finmind:ro      # FinMind fundamental data
      - ../../data/twse:/app/data/twse:ro            # TWSE institutional data
      - ../../data/finlab:/app/data/finlab:ro        # FinLab panel data (incl. delisted)
      - ../../data/research:/app/data/research:ro    # universe.txt, baseline_ic
      - ${CLAUDE_HOME:-C:/Users/ander/.claude}:/home/researcher/.claude  # rw: CLI needs full .claude dir for auth + settings
    environment:
      - EVAL_URL=http://evaluator:5000/evaluate
      - CLAUDE_MODEL=claude-sonnet-4-6
    entrypoint: ["sleep", "infinity"]  # loop.ps1 uses docker exec

  # Evaluator: Flask HTTP service wrapping evaluate.py (agent CANNOT see this)
  evaluator:
    build:
      context: ../..
      dockerfile: docker/autoresearch/Dockerfile.evaluator
    container_name: autoresearch-evaluator
    restart: unless-stopped
    networks:
      - autoresearch-net
    mem_limit: 8g
    cpus: 4
    tmpfs:
      - /tmp:size=512m
    volumes:
      - ./work:/app/work:ro                         # reads factor.py only (H-2: least privilege)
      - ./watchdog_data:/app/watchdog_data           # factor_returns, pending, pbo
      - ../../src:/app/src:ro                        # evaluate.py dependencies
      - ../../strategies:/app/strategies:ro           # strategy registry (H-1 fix)
      - ../../data:/app/data:ro                      # market + fundamental + research
      - ../../docs/research/autoresearch:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Watchdog: background Validator + Factor-Level PBO
  watchdog:
    build:
      context: ../..
      dockerfile: docker/autoresearch/Dockerfile
    container_name: autoresearch-watchdog
    restart: unless-stopped
    network_mode: none
    mem_limit: 8g
    cpus: 4
    tmpfs:
      - /tmp:size=512m
    volumes:
      - ./work:/app/work:ro
      - ./watchdog_data:/app/watchdog_data
      - ../../src:/app/src:ro
      - ../../data:/app/data:ro
      - ../../docs/research/autoresearch:/app/reports
    entrypoint: ["python", "/app/watchdog.py"]

networks:
  autoresearch-net:
    # Not internal — agent needs outbound for Anthropic API
    driver: bridge
